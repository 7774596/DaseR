name: Commit Lint

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

jobs:
  pr-title:
    name: Validate PR title (squash commit message)
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title format
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          echo "PR title: $PR_TITLE"
          pattern='^(feat|fix|refactor|chore|test|docs)\([a-z0-9-]+\): .+'
          if ! [[ "$PR_TITLE" =~ $pattern ]]; then
            echo "::error::PR title does not match '<type>(<scope>): <description>'."
            echo "  type  must be one of: feat | fix | refactor | chore | test | docs"
            echo "  scope must be lowercase [a-z0-9-] and non-empty"
            echo "  See CONTRIBUTING.md for details."
            exit 1
          fi

  commits:
    name: Validate commit messages in PR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check each commit subject in the PR
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          pattern='^(feat|fix|refactor|chore|test|docs)\([a-z0-9-]+\): .+'
          bad=0
          while IFS= read -r line; do
            sha="${line%% *}"
            subject="${line#* }"
            if ! [[ "$subject" =~ $pattern ]]; then
              echo "::error::Commit $sha has invalid subject: $subject"
              bad=1
            fi
          done < <(git log --format='%h %s' "$BASE_SHA".."$HEAD_SHA")
          if [ "$bad" -ne 0 ]; then
            echo "See CONTRIBUTING.md — '<type>(<scope>): <description>'."
            exit 1
          fi
          echo "All commit subjects match the required format."
